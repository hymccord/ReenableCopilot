name: Release

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for MinVer to compute version from tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          use-global-json: true

      - name: Build
        run: dotnet build ReenableCopilot/ReenableCopilot.csproj -c Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ReenableCopilot/bin/Release/net472/ReenableCopilot.vsix
          generate_release_notes: true
